services:
  - type: web
    name: fridgeai
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      # Optional — Render sets RENDER_EXTERNAL_URL automatically for CORS/PWA
      - key: APP_URL
        sync: false
